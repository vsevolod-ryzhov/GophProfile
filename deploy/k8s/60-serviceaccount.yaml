# Dedicated ServiceAccounts per workload. The app does not call the Kubernetes API, so no Role/RoleBinding is created — least privilege is "no permissions at all".
# Pods set automountServiceAccountToken: false so no token is mounted into the container.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gophprofile-server
  namespace: gophprofile
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gophprofile-worker
  namespace: gophprofile
automountServiceAccountToken: false
