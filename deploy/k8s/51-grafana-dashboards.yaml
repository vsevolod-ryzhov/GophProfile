# Grafana dashboards for GophProfile.
# The kube-prometheus-stack Grafana sidecar auto-discovers ConfigMaps labelled
# 'grafana_dashboard: "1"' and loads each JSON key as a dashboard.
# Dashboards use a 'datasource' template variable so they work on any cluster.
#
# Regenerate from grafana/dashboards/*.json with:
#   kubectl create configmap gophprofile-grafana-dashboards \
#     --namespace=monitoring \
#     --from-file=red.json=grafana/dashboards/red.json \
#     --from-file=kpis.json=grafana/dashboards/kpis.json \
#     --from-file=resources.json=grafana/dashboards/resources.json \
#     --dry-run=client -o yaml
# then re-apply the labels block below.
apiVersion: v1
