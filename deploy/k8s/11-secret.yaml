# Dev-only Secret with plaintext stringData for easy local testing on Rancher Desktop.
# For real environments, manage with sealed-secrets / external-secrets / SOPS, never commit.
apiVersion: v1
kind: Secret
metadata:
  name: gophprofile-secrets
  namespace: gophprofile
type: Opaque
stringData:
  DATABASE_DSN: "host=postgres user=postgres_user password=postgres_password dbname=postgres_db sslmode=disable"
  MINIO_ACCESS_KEY: "minio_user"
  MINIO_SECRET_KEY: "minio_password"
  RABBIT_URL: "amqp://guest:guest@rabbitmq:5672/"
