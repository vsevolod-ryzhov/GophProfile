apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gophprofile-server
  namespace: gophprofile
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gophprofile-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gophprofile-worker
  namespace: gophprofile
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gophprofile-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
