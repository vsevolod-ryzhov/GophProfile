apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-server
  namespace: gophprofile
  labels:
    app: gophprofile-server
    component: server
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gophprofile-server
  template:
    metadata:
      labels:
        app: gophprofile-server
        component: server
    spec:
      serviceAccountName: gophprofile-server
      automountServiceAccountToken: false
      # Must exceed the in-app Shutdown() timeout (30s) so in-flight requests drain.
      terminationGracePeriodSeconds: 45
      # Distroless nonroot image runs as UID 65532 — make it explicit and enforce non-root at the pod level.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: docker.io/library/gophprofile-server:dev
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9464
          envFrom:
            - configMapRef:
                name: gophprofile-config
            - secretRef:
                name: gophprofile-secrets
          # Readiness gates Service traffic — fail fast on unhealthy deps.
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          # Liveness only catches a wedged process — keep it lenient so a slow downstream doesn't trigger pod restarts.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
