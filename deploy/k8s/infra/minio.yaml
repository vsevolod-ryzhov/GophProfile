# Dev-only Secret — plaintext for easy local testing on Rancher Desktop
# For real environments, manage with sealed-secrets / external-secrets / SOPS, never commit
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: gophprofile
type: Opaque
stringData:
  MINIO_ROOT_USER: "minio_user"
  MINIO_ROOT_PASSWORD: "minio_password"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: gophprofile
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: gophprofile
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z
          args: ["server", "/data", "--console-address", ":9001"]
          envFrom:
            - secretRef:
                name: minio-secret
          ports:
            - { name: api, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: api }
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: gophprofile
spec:
  selector: { app: minio }
  ports:
    - { name: api, port: 9000, targetPort: api }
    - { name: console, port: 9001, targetPort: console }
