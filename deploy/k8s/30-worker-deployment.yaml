apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-worker
  namespace: gophprofile
  labels:
    app: gophprofile-worker
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gophprofile-worker
  template:
    metadata:
      labels:
        app: gophprofile-worker
        component: worker
    spec:
      serviceAccountName: gophprofile-worker
      automountServiceAccountToken: false
      # Worker may be processing a thumbnail when SIGTERM arrives — give it room.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: docker.io/library/gophprofile-worker:dev
          imagePullPolicy: Never
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 9464
          envFrom:
            - configMapRef:
                name: gophprofile-worker-config
            - secretRef:
                name: gophprofile-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
