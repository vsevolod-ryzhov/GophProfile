apiVersion: v1
kind: Service
metadata:
  name: gophprofile-server
  namespace: gophprofile
  labels:
    app: gophprofile-server
spec:
  type: ClusterIP
  selector:
    app: gophprofile-server
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9464
      targetPort: metrics
