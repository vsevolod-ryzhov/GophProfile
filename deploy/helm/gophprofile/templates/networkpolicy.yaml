{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.fullname" . }}-default-deny
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.fullname" . }}-allow-dns
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.server.name" . }}-ingress
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: gophprofile-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress]
  ingress:
    - from:
        {{- range .Values.networkPolicy.ingressControllerNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - { protocol: TCP, port: {{ .Values.server.containerPort }} }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - { protocol: TCP, port: {{ .Values.server.metricsPort }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.worker.name" . }}-ingress
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: gophprofile-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - { protocol: TCP, port: {{ .Values.worker.metricsPort }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.fullname" . }}-app-egress-infra
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Egress]
  egress:
    {{- range $name, $cfg := .Values.networkPolicy.infra }}
    # Both selectors in the same peer = AND: pods labelled `app=<name>` *within the release's namespace*.
    # Without the namespaceSelector, a podSelector alone is implicitly scoped to the policy's namespace, but spelling it out keeps intent obvious and survives any future namespace-spanning refactor.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Release.Namespace }}
          podSelector:
            matchLabels: { app: {{ $cfg.app }} }
      ports:
        - { protocol: TCP, port: {{ $cfg.port }} }
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.fullname" . }}-app-egress-otel
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - { protocol: TCP, port: 4317 }
        - { protocol: TCP, port: 4318 }
---
# Lock down the infra pods (Postgres, MinIO, RabbitMQ) so they only accept connections from the app pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gophprofile.fullname" . }}-infra-ingress-from-app
  labels: {{- include "gophprofile.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          {{- range $name, $cfg := .Values.networkPolicy.infra }}
          - {{ $cfg.app }}
          {{- end }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [gophprofile-server, gophprofile-worker]
{{- end }}
