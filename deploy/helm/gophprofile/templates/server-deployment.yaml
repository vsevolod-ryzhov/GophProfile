apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gophprofile.server.name" . }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    {{- include "gophprofile.server.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gophprofile-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels: {{- include "gophprofile.server.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gophprofile.server.name" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.server.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "gophprofile.serverImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - { name: http,    containerPort: {{ .Values.server.containerPort }} }
            - { name: metrics, containerPort: {{ .Values.server.metricsPort }} }
          envFrom:
            - configMapRef:
                name: {{ include "gophprofile.server.name" . }}-config
            - secretRef:
                name: {{ include "gophprofile.secretName" . }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
