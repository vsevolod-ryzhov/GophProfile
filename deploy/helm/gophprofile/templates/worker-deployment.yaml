apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gophprofile.worker.name" . }}
  labels:
    {{- include "gophprofile.labels" . | nindent 4 }}
    {{- include "gophprofile.worker.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: gophprofile-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels: {{- include "gophprofile.worker.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "gophprofile.worker.name" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "gophprofile.workerImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - { name: metrics, containerPort: {{ .Values.worker.metricsPort }} }
          envFrom:
            - configMapRef:
                name: {{ include "gophprofile.worker.name" . }}-config
            - secretRef:
                name: {{ include "gophprofile.secretName" . }}
          # The worker has no inbound HTTP, so we probe the metrics endpoint — if /metrics responds, the process is alive and its observability stack is up.
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: {{ .Values.worker.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.worker.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.worker.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.worker.livenessProbe.failureThreshold }}
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
